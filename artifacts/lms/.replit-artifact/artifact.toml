kind = "web"
previewPath = "/"
title = "Learning Management System"
version = "1.0.0"
id = "artifacts/lms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22419
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lms run dev"

[services.env]
PORT = "22419"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lms", "run", "build"]
publicDir = "artifacts/lms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
